services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SITE_URL: ${SITE_URL:-https://example.com}
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      SITE_URL: ${SITE_URL:-https://example.com}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://example.com}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
